<!-- uses the base template for header and footer -->
{% extends "base.html" %}

<!-- actual content of the page starts here -->
{% block content %}

<!-- Main -->
<main class="main">
    <h1 class="page-title">SignBridge</h1>
    <p class="page-subtitle">Real-Time Sign Language Communication</p>
    <div class="card card-sm">
        <form method="POST" action="{{ url_for('main.join') }}">
            <!-- User Name Input -->
            <div class="form-group">
                <label class="form-label" for="userName">Your Name</label>
                <input class="input" type="text" id="userName" name="user_name" placeholder="Enter your name">
            </div>
            <!-- Room code -->
            <div class="form-group">
                <label class="form-label" for="roomCode">Room Code</label>
                <input class="input" type="text" id="roomCode" name="room_code" placeholder="Enter room code">
            </div>
            <!-- Join Room -->
            <button type="submit" class="btn btn-primary btn-block">Start Call</button>
        </form>
        <div class="divider">OR</div>
        <!-- Create New Session -->
        <form method="POST" action="{{ url_for('main.create_room') }}">
            <button type="submit" class="btn btn-secondary btn-block">Create New Session</button>
        </form>
    </div>
</main>

{% endblock %}
<!-- anything added below endblock WILL NOT show up in the page -->
