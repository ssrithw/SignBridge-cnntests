<!-- uses the base template for header and footer -->
{% extends "base.html" %}

<!-- actual content of the page starts here -->
{% block content %}

<!-- Main -->
<main class="main">
    <div class="card card-sm text-center">
        <h1 class="page-title">SignBridge</h1>
        <p class="page-subtitle">Real-Time Sign Language Communication</p>
        
        <a href="{{ url_for('main.join') }}" class="btn btn-primary btn-block">Join Room</a>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary btn-block" style="margin-top: 0.5rem;">Sign In</a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-secondary btn-block" style="margin-top: 0.5rem;">Sign Up</a>
    </div>
</main>

{% endblock %}
<!-- anything added below endblock WILL NOT show up in the page -->
